spring:
  application:
    name: citasmedicas

  datasource:
    url: jdbc:h2:mem:citasdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: sa

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8353

logging:
  level:
    com.citasmedicas: debug
